// ── PRICE ──────────────────────────────────────────────────────────────────
const Price = ({ value, size }) => {
  const [d, c] = value.toFixed(2).split(".");
  const fs = size === "lg" ? 20 : 16;
  const ss = size === "lg" ? 11 : 9;
  return (
    <span style={{ fontWeight:800, fontSize:fs, lineHeight:1 }}>
      <sup style={{ fontSize:ss, fontWeight:800, verticalAlign:"super" }}>$</sup>
      {d}<sup style={{ fontSize:ss, fontWeight:800, verticalAlign:"super" }}>{c}</sup>
    </span>
  );
};

// ── ADD BUTTON — green pill matching Instacart reference ──────────────────
const AddBtn = ({ id, cart, onAdd, onRemove, small }) => {
  const qty = cart[id] || 0;
  const h = small ? 30 : 36;
  if (qty === 0) return (
    <button
      onClick={e => { e.stopPropagation(); onAdd(id); }}
      style={{
        background:"linear-gradient(135deg, #1d7742 0%, #166534 100%)", color:"white", border:"none",
        borderRadius:100,
        padding: small ? "5px 12px" : "7px 16px",
        cursor:"pointer", fontSize: small ? 12.5 : 14, fontWeight:700,
        display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap",
        boxShadow:"0 2px 10px rgba(22,101,52,0.35)", letterSpacing:"0.1px",
        transition:"transform 0.15s, box-shadow 0.15s",
      }}
      onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.03)"; e.currentTarget.style.boxShadow = "0 4px 14px rgba(22,101,52,0.4)"; }}

// ── CONTAINER WIDTH HOOK (iframe-safe ResizeObserver) ─────────────────────
const useContainerWidth = (ref) => {
  const [w, setW] = useState(0);
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(([entry]) => setW(entry.contentRect.width));
    ro.observe(ref.current);
    setW(ref.current.offsetWidth);
    return () => ro.disconnect();
  }, []);
  return w;
};

const ProductDetailModal = ({ product, onClose, cart, onAdd, onRemove, allProducts }) => {
  const [quantity, setQuantity] = useState(1);
  const [expandedSection, setExpandedSection] = useState(null);
  const [imgLoaded, setImgLoaded] = useState(false);
  const [isZoomed, setIsZoomed] = useState(false);
  const modalRef = useRef(null);
  
  // Similar products (excluding current)
  const similarProducts = allProducts.filter(p => p.id !== product.id).slice(0, 4);
  const itemsToAddNext = allProducts.filter(p => p.id !== product.id).slice(4, 10);
  
  // Nutrition data (mock)
  const nutrition = {
    sodium: "65mg", sugar: "11g", fat: "4g", calories: "120",
    servingSize: "28.0", servingsPerContainer: "12",
    totalFat: "4g", saturatedFat: "3g", transFat: "0g",
    cholesterol: "5mg", totalCarb: "19g", dietaryFiber: "1g", totalSugars: "11g", protein: "1g"
  };
  
  // Close on backdrop click
  const handleBackdropClick = (e) => {
    if (e.target === e.currentTarget) onClose();
  };
  
  // Close on ESC key
  useEffect(() => {
    const handleEsc = (e) => { 
      if (e.key === "Escape") {
        if (isZoomed) setIsZoomed(false);
        else onClose();
      }
    };
    document.addEventListener("keydown", handleEsc);
    return () => {
      document.removeEventListener("keydown", handleEsc);
    };
  }, [onClose, isZoomed]);
  
  // No scroll lock - modal overlay handles interaction blocking
  
  const toggleSection = (section) => {
    setExpandedSection(expandedSection === section ? null : section);
  };

  const AccordionSection = ({ title, children, id }) => (
    <div style={{ borderBottom:"1px solid #f0f0f0" }}>
      <div

          fontWeight:600, fontSize:14, color:"#1a1a1a"
        }}

        <span style={{ fontSize:11, color:"#888", transition:"transform 0.2s", transform: expandedSection === id ? "rotate(180deg)" : "rotate(0)" }}>▼</span>
      </div>
      {expandedSection === id && (
        <div style={{ paddingBottom:16, fontSize:13, lineHeight:1.7, color:"#444" }}>
          {children}
        </div>
      )}
    </div>
  );
  
  // Image Zoom - elegant in-modal expansion
  const ZoomView = () => (
    <div 
      onClick={() => setIsZoomed(false)}

        position:"absolute", inset:0, zIndex:20,

        display:"flex", flexDirection:"column",

          }}

        </button>
        <div style={{ fontSize:14, fontWeight:600, color:"#333" }}>{product.name}</div>
        <button
          onClick={() => setIsZoomed(false)}

            background:"#f5f5f5", border:"none", borderRadius:8,
            width:36, height:36, cursor:"pointer", fontSize:18,
            display:"flex", alignItems:"center", justifyContent:"center"

          ✕
        </button>
      </div>
      
      {/* Full image view */}
      <div style={{ 
        flex:1, display:"flex", alignItems:"center", justifyContent:"center",
        padding:40, background:"#fafafa"
      }}>
        <img 
          src={product.img} 
          alt={product.name}
          style={{ 
            maxWidth:"100%", maxHeight:"calc(100vh - 200px)", 
            objectFit:"contain",
            borderRadius:12,
            boxShadow:"0 8px 32px rgba(0,0,0,0.08)"

      {/* Footer hint */}
      <div style={{ 
        padding:"12px 24px", borderTop:"1px solid #f0f0f0",
        textAlign:"center", fontSize:12, color:"#888"

        Click anywhere or press ESC to close

    </div>
  );
  
  return (
    <>
      <div 
        onClick={handleBackdropClick}
        style={{ 
          position:"fixed", inset:0, zIndex:1000,
          background:"rgba(0,0,0,0.5)",

          borderBottom:"1px solid #f0f0f0", borderRadius:"16px 16px 0 0",
          padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between"
        }}>
          <button

          <div style={{ display:"flex", gap:10 }}>
            <button style={{ background:"#f5f5f5", border:"none", borderRadius:20, padding:"8px 18px", fontSize:13, fontWeight:600, cursor:"pointer" }}>Delivery</button>

                <div style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #ddd", paddingBottom:8, marginBottom:8 }}>

                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", fontWeight:700, borderBottom:"6px solid #1a1a1a", paddingBottom:6, marginBottom:8 }}>

                  onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,0.08)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
                  onMouseLeave={e => { e.currentTarget.style.boxShadow = ""; e.currentTarget.style.transform = ""; }}
                >
                  <div style={{ aspectRatio:"1", position:"relative", overflow:"hidden" }}>
                    <img src={p.img} alt={p.name} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                    <div style={{ position:"absolute", top:8, right:8 }}>
                      <AddBtn id={p.id} cart={cart} onAdd={onAdd} onRemove={onRemove} small />
                    </div>

                  <div style={{ padding:"12px 14px" }}>
                    <div style={{ fontSize:16, fontWeight:800, marginBottom:4 }}>${p.price.toFixed(2)}</div>

              </p>
              
              <h3 style={{ fontSize:18, fontWeight:800, marginBottom:16, color:"#1a1a1a" }}>Ingredients</h3>

// ── ROOT ───────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("main");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart] = useState({ 5:1, 6:1, 7:1 });
  const add    = id => setCart(p => ({ ...p, [id]:(p[id]||0)+1 }));
  const remove = id => setCart(p => { const n={...p}; if(n[id]<=1) delete n[id]; else n[id]--; return n; });
  
  // Combine all products for modal
  const allProducts = [...ALL_PRODUCTS, ...FLYER_PRODUCTS];
  
  const openProduct = (product) => {
    setSelectedProduct(product);
  };
  
  const closeProduct = () => {
    setSelectedProduct(null);
  };
  
  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        html { overflow-y:scroll; }
        body { font-family:'Noto Sans KR',sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:#d8d8d8; border-radius:4px; }
        ::-webkit-scrollbar-thumb:hover { background:#bbb; }
        .hide-scrollbar::-webkit-scrollbar { display:none; }
        .hide-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
        button:focus { outline:none; }
        button { font-family:inherit; }
        input { font-family:inherit; }
      `}</style>
      {page === "main" && <MainPage onStoreClick={() => setPage("store")} cart={cart} onAdd={add} onRemove={remove} onProductClick={openProduct} />}
      {page === "store" && <StorePage onHome={() => setPage("main")} cart={cart} onAdd={add} onRemove={remove} onProductClick={openProduct} />}
      
      {/* Product Detail Modal - overlays on top */}
      {selectedProduct && (
        <ProductDetailModal 
          product={selectedProduct} 
          onClose={closeProduct} 
          cart={cart} 
          onAdd={add} 
          onRemove={remove}
          allProducts={allProducts}
        />
      )}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
